name: local-wp-site

services:
  db:
    image: mariadb:11.4.12
    restart: unless-stopped

    environment:
      MARIADB_DATABASE: ${WP_DB_NAME:-wordpress}
      MARIADB_USER: ${WP_DB_USER:-wordpress}
      MARIADB_PASSWORD: ${WP_DB_PASSWORD:?WP_DB_PASSWORD is required}
      MARIADB_ROOT_PASSWORD: ${WP_DB_ROOT_PASSWORD:?WP_DB_ROOT_PASSWORD is required}

    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mariadb/conf.d/local.cnf:/etc/mysql/conf.d/zz-local.cnf:ro
      - ./docker/mariadb/init:/docker-entrypoint-initdb.d:ro

    networks:
      - backend

    healthcheck:
      test:
        - CMD
        - healthcheck.sh
        - --connect
        - --innodb_initialized
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  wordpress:
    image: wordpress:7.0.1-php8.4-fpm
    restart: unless-stopped
    # build:
    #   context: .
    #   dockerfile: docker/php/Dockerfile
    # target: development

    depends_on:
      db:
        condition: service_healthy

    environment:
      WORDPRESS_DB_HOST: ${WP_DB_HOST:-db:3306}
      WORDPRESS_DB_NAME: ${WP_DB_NAME:-wordpress}
      WORDPRESS_DB_USER: ${WP_DB_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${WP_DB_PASSWORD:?WP_DB_PASSWORD is required}
      WORDPRESS_TABLE_PREFIX: ${WP_TABLE_PREFIX:-wp_}
      WORDPRESS_DEBUG: "1"

      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DATABASE: ${REDIS_DATABASE:-0}
      WP_REDIS_PREFIX: ${WP_REDIS_PREFIX:-local-wp-site:}
      WP_CACHE_KEY_SALT: ${WP_CACHE_KEY_SALT:-local-wp-site:}

      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG_LOG', true);
        define('WP_DEBUG_DISPLAY', false);
        define('SCRIPT_DEBUG', true);

        define('WP_ENVIRONMENT_TYPE', '${WP_ENVIRONMENT_TYPE:-local}');
        define('DISALLOW_FILE_EDIT', false);
        define('DISABLE_WP_CRON', true);

        define('WP_REDIS_HOST', getenv('REDIS_HOST'));
        define('WP_REDIS_PORT', (int) getenv('REDIS_PORT'));
        define('WP_REDIS_PASSWORD', getenv('REDIS_PASSWORD'));
        define('WP_REDIS_DATABASE', (int) getenv('REDIS_DATABASE'));

        define('WP_REDIS_PREFIX', getenv('WP_REDIS_PREFIX'));
        define('WP_CACHE_KEY_SALT', getenv('WP_CACHE_KEY_SALT'));

        # define('WP_ALLOW_MULTISITE', ${WP_ALLOW_MULTISITE:-true});

        # define('MULTISITE', ${WP_MULTISITE:-true});
        # define('SUBDOMAIN_INSTALL', ${WP_SUBDOMAIN_INSTALL:-false});
        # define('DOMAIN_CURRENT_SITE', '${WP_DOMAIN:-wordpress.test}');
        # define('PATH_CURRENT_SITE', '${WP_PATH:-/}');
        # define('SITE_ID_CURRENT_SITE', ${WP_SITE_ID:-1});
        # define('BLOG_ID_CURRENT_SITE', ${WP_BLOG_ID:-1});

    volumes:
      - wp_core:/var/www/html
      # - ./wordpress:/var/www/html
      - ./docker/php/conf.d/local.ini:/usr/local/etc/php/conf.d/zz-local.ini:ro
      - ./docker/php/fpm.d/zz-local-pool.conf:/usr/local/etc/php-fpm.d/zz-local-pool.conf:ro
      # - type: bind
      #   source: ./app/themes/company-block-theme
      #   target: /var/www/html/wp-content/themes/company-block-theme
      #   read_only: true

    networks:
      - frontend
      - backend

  nginx:
    image: nginx:1.30.3-alpine
    restart: unless-stopped

    depends_on:
      wordpress:
        condition: service_started

    # ports:
    #   - "127.0.0.1:8080:80"
    expose:
      - "80"

    environment:
      SERVER_NAME: ${SERVER_NAME:-wordpress.test}

    # command: >
    #   /bin/sh -c "
    #   envsubst '$$SERVER_NAME' \
    #   < /etc/nginx/conf.d/default.conf.template \
    #   > /etc/nginx/conf.d/default.conf &&
    #   nginx -g 'daemon off;'
    #   "

    volumes:
      - wp_core:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # - ./wordpress:/var/www/html:ro
      # - type: bind
      #   source: ./app/themes/company-block-theme
      #   target: /var/www/html/wp-content/themes/company-block-theme
      #   read_only: true
  
    labels:
      - traefik.enable=true

      - traefik.http.routers.wordpress.rule=Host(`${SERVER_NAME}`)
      - traefik.http.routers.wordpress.entrypoints=websecure
      - traefik.http.routers.wordpress.tls=true

      - traefik.http.services.wordpress.loadbalancer.server.port=80

    networks:
      - frontend

    # labels:
    #   - traefik.enable=true
    #   - traefik.http.routers.wordpress.rule=Host(`wordpress.test`)
    #   - traefik.http.routers.wordpress.entrypoints=websecure
    #   - traefik.http.routers.wordpress.tls=true
    #   - traefik.http.services.wordpress.loadbalancer.server.port=80

  node:
    image: node:24-alpine
    working_dir: /app

    volumes:
      # - ./wordpress/wp-content/themes/company-theme:/app
      - theme_node_modules:/app/node_modules
      # - ./wordpress/wp-content/themes/company-block-theme:/app

    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

    ports:
      - "127.0.0.1:5173:5173"

    profiles:
      - frontend

  composer:
    image: composer:2
    working_dir: /app

    volumes:
      # - ./wordpress/wp-content/plugins/company-plugin:/app
      # - ./wordpress/wp-content/plugins/company-feedback:/app
      - ./wordpress/wp-content/plugins/company-fulfilment:/app

    profiles:
      - tools

  wpcli:
    image: wordpress:cli-php8.4
    user: "33:33"

    depends_on:
      db:
        condition: service_healthy

      # redis:
      #   condition: service_started

    working_dir: /var/www/html

    environment:
      WORDPRESS_DB_HOST: ${WP_DB_HOST:-db:3306}
      WORDPRESS_DB_NAME: ${WP_DB_NAME:-wordpress}
      WORDPRESS_DB_USER: ${WP_DB_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${WP_DB_PASSWORD:?WP_DB_PASSWORD is required}
      WORDPRESS_TABLE_PREFIX: ${WP_TABLE_PREFIX:-wp_}
      WORDPRESS_DEBUG: "1"
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DATABASE: ${REDIS_DATABASE:-0}

      WP_REDIS_PREFIX: ${WP_REDIS_PREFIX:-local-wp-site:}
      WP_CACHE_KEY_SALT: ${WP_CACHE_KEY_SALT:-local-wp-site:}

      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG_LOG', true);
        define('WP_DEBUG_DISPLAY', false);
        define('SCRIPT_DEBUG', true);
        define('WP_ENVIRONMENT_TYPE', '${WP_ENVIRONMENT_TYPE:-local}');

        define('WP_REDIS_HOST', getenv('REDIS_HOST'));
        define('WP_REDIS_PORT', (int) getenv('REDIS_PORT'));
        define('WP_REDIS_PASSWORD', getenv('REDIS_PASSWORD'));
        define('WP_REDIS_DATABASE', (int) getenv('REDIS_DATABASE'));

        define('WP_REDIS_PREFIX', getenv('WP_REDIS_PREFIX'));
        define('WP_CACHE_KEY_SALT', getenv('WP_CACHE_KEY_SALT'));

    volumes:
      - ./wordpress:/var/www/html
      - ./docker/php/conf.d/local.ini:/usr/local/etc/php/conf.d/zz-local.ini:ro

    networks:
      - frontend
      - backend

    profiles:
      - tools

  # redis:
  #   image: redis:8-alpine
  #   restart: unless-stopped

  #   command:
  #     - redis-server
  #     - --maxmemory
  #     - 512mb
  #     - --maxmemory-policy
  #     - allkeys-lfu
  #     - --save
  #     - ""

  #   networks:
  #     - backend

  #   healthcheck:
  #     test:
  #       - CMD
  #       - redis-cli
  #       - ping
  #     interval: 10s
  #     timeout: 3s
  #     retries: 5

  wpcron:
    image: wordpress:cli-php8.4

    user: "33:33"

    depends_on:
      db:
        condition: service_healthy

    entrypoint:
      - /bin/sh
      - -c

    command: >
      while true;
      do
        wp cron event run --due-now
        --path=/var/www/html
        || true;
        sleep 60;
      done

    environment:
      WORDPRESS_DB_HOST: ${WP_DB_HOST:-db:3306}
      WORDPRESS_DB_NAME: ${WP_DB_NAME:-wordpress}
      WORDPRESS_DB_USER: ${WP_DB_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${WP_DB_PASSWORD:?required}
      WORDPRESS_TABLE_PREFIX: ${WP_TABLE_PREFIX:-wp_}

      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DATABASE: ${REDIS_DATABASE:-0}

      WP_REDIS_PREFIX: ${WP_REDIS_PREFIX:-local-wp-site:}
      WP_CACHE_KEY_SALT: ${WP_CACHE_KEY_SALT:-local-wp-site:}

    volumes:
      - ./wordpress:/var/www/html

    networks:
      - frontend
      - backend

  # traefik:
  #   image: traefik:v3.5
  #   restart: unless-stopped
  #   networks:
  #     - frontend
  #   command:
  #     - "--api.dashboard=true"
